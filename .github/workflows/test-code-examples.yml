name: Test code examples

on:
  pull_request:
    paths:
      - 'astro/src/code-example-repositories/**'
  workflow_dispatch:

jobs:
  test:
    name: Test code examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run all code example tests
        run: bash src/scripts/test-code-examples.sh