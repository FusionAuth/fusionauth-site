name: test code snippets

on:
  pull_request:
    paths:
      - 'astro/src/code-example-repositories/**'
  workflow_dispatch:

jobs:
  webauthn:
    name: WebAuthn utility functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

TODO run npm test in each code example repositrory

      - name: Install dependencies
        working-directory: astro/src/code-example-repositories/webauthn
        run: npm install

      - name: Run Jest tests
        working-directory: astro/src/code-example-repositories/webauthn
        run: npm test
