name: Test code examples

on:
  pull_request:
    paths:
      - 'astro/src/code-example-repositories/**'
  workflow_dispatch:

jobs:
  test:
    name: Test code examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run all code example tests
        run: |
          set -euo pipefail
          for LOCAL_REPOSITORY_PATH in astro/src/code-example-repositories/*/; do
            REPOSITORY_NAME=$(basename "$LOCAL_REPOSITORY_PATH")
            TEST_SCRIPT="${LOCAL_REPOSITORY_PATH}tests/test.sh"

            if [ ! -f "$TEST_SCRIPT" ]; then
              echo "Error: $REPOSITORY_NAME has no tests/test.sh" >&2
              exit 1
            fi

            echo "Testing $REPOSITORY_NAME"
            (cd "$LOCAL_REPOSITORY_PATH" && bash tests/test.sh) # cd into the repository as the working directory for the test
          done