name: Validate code snippet annotations

on:
  pull_request:
    paths:
      - 'astro/src/code-example-repositories/**'

jobs:
  check:
    name: Validate code snippet annotations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: astro

      - name: Validate Bluehawk annotations
        run: npm run validate-code-snippets
        working-directory: astro
