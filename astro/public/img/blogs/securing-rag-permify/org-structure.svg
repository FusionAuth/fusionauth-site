<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="system-ui, -apple-system, sans-serif">

  <!-- Dark background -->
  <rect width="700" height="340" rx="12" fill="#191933"/>

  <!-- ====== DOCUMENT GROUPS (right column) ====== -->
  <rect x="490" y="30" width="180" height="32" rx="6" fill="#1f1f3a" stroke="#2e2e50" stroke-width="1"/>
  <text x="580" y="51" text-anchor="middle" font-size="10" fill="#c4b8f0">CS docs (10)</text>

  <rect x="490" y="80" width="180" height="32" rx="6" fill="#1f1f3a" stroke="#2e2e50" stroke-width="1"/>
  <text x="580" y="101" text-anchor="middle" font-size="10" fill="#c4b8f0">Fraud docs (10)</text>

  <rect x="490" y="130" width="180" height="32" rx="6" fill="#1f1f3a" stroke="#2e2e50" stroke-width="1"/>
  <text x="580" y="151" text-anchor="middle" font-size="10" fill="#c4b8f0">Disputes docs (10)</text>

  <rect x="490" y="180" width="180" height="32" rx="6" fill="#1f1f3a" stroke="#2e2e50" stroke-width="1"/>
  <text x="580" y="201" text-anchor="middle" font-size="10" fill="#c4b8f0">Loan docs (10)</text>

  <!-- ====== ADMIN ====== -->
  <rect x="30" y="55" width="160" height="44" rx="8" fill="#5B30E8"/>
  <text x="48" y="75" font-size="11" font-weight="600" fill="#ffffff">👤 Admin</text>
  <text x="48" y="89" font-size="9" fill="#c4b8f0">org admin</text>

  <!-- Admin → all 4 (solid green, thick) -->
  <line x1="190" y1="68" x2="490" y2="46" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="190" y1="74" x2="490" y2="96" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="190" y1="80" x2="490" y2="146" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="190" y1="86" x2="490" y2="196" stroke="#22c55e" stroke-width="2.5"/>

  <!-- ====== JANE ====== -->
  <rect x="30" y="160" width="160" height="44" rx="8" fill="#262645" stroke="#3a3a5c" stroke-width="1"/>
  <text x="48" y="180" font-size="11" font-weight="600" fill="#e8e8f0">👤 Jane</text>
  <text x="48" y="194" font-size="9" fill="#8080aa">CS team lead</text>

  <!-- Jane → CS docs (solid green, team access) -->
  <line x1="190" y1="175" x2="490" y2="46" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Jane → Disputes (dashed green, viewer grant) -->
  <line x1="190" y1="185" x2="490" y2="146" stroke="#6C3CF5" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Jane ✗ Fraud, Loan (faint red dotted) -->
  <line x1="190" y1="180" x2="490" y2="96" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="190" y1="188" x2="490" y2="196" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>

  <!-- ====== STRANGER ====== -->
  <rect x="30" y="250" width="160" height="44" rx="8" fill="#262645" stroke="#3a3a5c" stroke-width="1"/>
  <text x="48" y="270" font-size="11" font-weight="600" fill="#e8e8f0">👤 Stranger</text>
  <text x="48" y="284" font-size="9" fill="#8080aa">no team, no org role</text>

  <!-- Stranger ✗ all (faint red dotted) -->
  <line x1="190" y1="268" x2="490" y2="46" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="190" y1="272" x2="490" y2="96" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="190" y1="276" x2="490" y2="146" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="190" y1="280" x2="490" y2="196" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>

  <!-- ====== KEY (bottom) ====== -->
  <line x1="190" y1="325" x2="230" y2="325" stroke="#22c55e" stroke-width="2.5"/>
  <text x="240" y="329" font-size="9" fill="#8080aa">Team / org access</text>

  <line x1="370" y1="325" x2="410" y2="325" stroke="#6C3CF5" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="420" y="329" font-size="9" fill="#8080aa">Viewer grant</text>

  <line x1="530" y1="325" x2="570" y2="325" stroke="#ef4444" stroke-width="2" stroke-dasharray="2 6" opacity="0.35"/>
  <text x="580" y="329" font-size="9" fill="#8080aa">No access</text>

</svg>
