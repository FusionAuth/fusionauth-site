<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 940 430" font-family="system-ui, -apple-system, sans-serif">

  <!-- Dark background -->
  <rect width="940" height="430" rx="12" fill="#191933"/>

  <!-- ====== ANSWER ARC with text gap ====== -->
  <!-- Full arc path (invisible, used for textPath reference) -->
  <defs>
    <path id="answer-arc" d="M 801 180 C 801 20, 95 20, 95 180"/>
  </defs>

  <!-- Arc drawn as two dashed segments with a gap in the middle for text -->
  <!-- Left segment: from User up to gap -->
  <path d="M 95 180 C 95 20, 310 10, 380 28" stroke="#6a6a8a" stroke-width="2" fill="none"/>
  <!-- Right segment: from gap to LLM -->
  <path d="M 520 28 C 590 10, 801 20, 801 180" stroke="#6a6a8a" stroke-width="2" fill="none"/>

  <!-- Open arrowhead pointing down at User end -->
  <polyline points="88,172 95,187 102,172" stroke="#6a6a8a" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Answer label sitting in the gap -->
  <text x="450" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#c8c8e0">Answer</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#8080aa" font-style="italic">Based on authorized documents only</text>

  <!-- ====== USER BOX ====== -->
  <rect x="40" y="185" width="110" height="80" rx="10" fill="#262645" stroke="#3a3a5c" stroke-width="1"/>
  <text x="95" y="218" text-anchor="middle" font-size="22" fill="#8080aa">👤</text>
  <text x="95" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8f0">User</text>

  <!-- Arrow: User to Vector Search -->
  <line x1="150" y1="225" x2="218" y2="225" stroke="#6a6a8a" stroke-width="2"/>
  <polyline points="218,218 231,225 218,232" stroke="#6a6a8a" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="189" y="215" text-anchor="middle" font-size="10" fill="#8080aa" font-style="italic">query</text>

  <!-- ====== VECTOR SEARCH BOX ====== -->
  <rect x="238" y="185" width="140" height="80" rx="10" fill="#262645" stroke="#3a3a5c" stroke-width="1"/>
  <text x="308" y="218" text-anchor="middle" font-size="22" fill="#8080aa">🔍</text>
  <text x="308" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8f0">Vector Search</text>

  <!-- Arrow: Vector Search to Permify -->
  <line x1="378" y1="225" x2="438" y2="225" stroke="#6a6a8a" stroke-width="2"/>
  <polyline points="438,218 451,225 438,232" stroke="#6a6a8a" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="410" y="215" text-anchor="middle" font-size="10" fill="#8080aa" font-style="italic">10 docs</text>

  <!-- ====== PERMIFY BOX ====== -->
  <rect x="456" y="155" width="170" height="140" rx="14" fill="#5B30E8" fill-opacity="0.15" stroke="#5B30E8" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="470" y="169" width="142" height="112" rx="10" fill="#5B30E8"/>

  <!-- Permify logo (centered: inner box x=470 w=142 -> cx=541, icon 52px wide -> x=515) -->
  <image x="516" y="178" width="50" height="45" href="data:image/png;base64,"/>

  <text x="541" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-style="italic">Permify</text>
  <text x="541" y="264" text-anchor="middle" font-size="10" fill="#c4b8f0">Authorization Service</text>

  <!-- Arrow: Permify to LLM (green, open arrowhead) -->
  <line x1="626" y1="215" x2="728" y2="215" stroke="#22c55e" stroke-width="2"/>
  <polyline points="728,208 741,215 728,222" stroke="#22c55e" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="679" y="203" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">3 permitted</text>

  <!-- Arrow: Permify down (red, blocked, open arrowhead) -->
  <line x1="541" y1="295" x2="541" y2="348" stroke="#ef4444" stroke-width="2"/>
  <polyline points="534,348 541,361 548,348" stroke="#ef4444" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="541" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">7 blocked</text>
  <text x="541" y="398" text-anchor="middle" font-size="10" fill="#884444" font-style="italic">Never reach the LLM</text>

  <!-- ====== LLM BOX ====== -->
  <rect x="746" y="180" width="110" height="80" rx="10" fill="#262645" stroke="#3a3a5c" stroke-width="1"/>
  <text x="801" y="213" text-anchor="middle" font-size="22" fill="#8080aa">🤖</text>
  <text x="801" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8f0">LLM</text>
</svg>
